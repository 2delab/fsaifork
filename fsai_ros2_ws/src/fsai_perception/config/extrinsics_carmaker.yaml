# CarMaker extrinsics: LiDAR (Lidar_F) -> Camera (Cam_F)
# Derived from TF:
#   Fr1A -> Lidar_F: x=2.921, z=0.163 (no rotation)
#   Fr1A -> Cam_F:   x=1.532, z=0.816, pitch=15deg downward
# So Lidar_F -> Cam_F = Cam_F^-1 * Lidar_F:
#   translation: x = 2.921-1.532 = 1.389m (LiDAR is 1.389m further forward than camera)
#                z = 0.163-0.816 = -0.653m (LiDAR is 0.653m lower than camera)
#   rotation: pitch = -15deg = -0.262 rad (camera tilts 15deg down relative to LiDAR)
lidar_to_camera:
  translation:
    x: 1.389    # LiDAR is 1.389m further forward than camera
    y: 0.0      # No lateral offset
    z: -0.653   # LiDAR is 0.653m lower than camera
  rotation:
    roll: 0.0
    pitch: -0.262   # -15 degrees (camera angled down, LiDAR is flat)
    yaw: 0.0
